
services:
  db:
    image: postgres:15-alpine
    container_name: zeus_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: zeus_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: zeus_auto_db
    ports:
      - "5432:5432"


    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zeus_user -d zeus_auto_db"]
      interval: 5s
      timeout: 5s
      retries: 5


  backend:
    build:
      context: ./backend
    container_name: zeus_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://zeus_user:${DB_PASSWORD}@db:5432/zeus_auto_db
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      REFRESH_SECRET: ${REFRESH_SECRET}
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/ping > /dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: zeus_nginx
    restart: unless-stopped
    environment:
      - SERVER_NAME=${SERVER_NAME}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/conf.d/default.conf.template:ro  # ← ИЗМЕНЕНО!
      - ./ssl:/ssl:ro
      - ./ssl-status:/ssl-status:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    extra_hosts:
      - "host.docker.internal:172.17.0.1"
    depends_on:
      backend:
        condition: service_healthy
    command: /bin/sh -c "envsubst '$$SERVER_NAME' < /etc/nginx/conf.d/default.conf.template > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"  # ← ДОБАВЛЕНО!

  metabase:
    image: metabase/metabase:latest
    container_name: zeus_metabase
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase_db
      MB_DB_PORT: 5432
      MB_DB_USER: zeus_user
      MB_DB_PASS: ${DB_PASSWORD}
      MB_DB_HOST: db
      MB_ENCRYPTION_SECRET_KEY: ${METABASE_SECRET}
    depends_on:
      - db
    volumes:
      - metabase_data:/metabase-data

volumes:
  postgres_data:
  metabase_data:


