services:
  db:
    image: postgres:15-alpine
    container_name: zeus_db
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: "1.0"
    environment:
      POSTGRES_USER: zeus_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: zeus_auto_db
    ports:
      - "10.16.0.4:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - /opt/wal_archive:/var/lib/postgresql/wal_archive
    command: >
      postgres
      -c wal_level=replica
      -c archive_mode=on
      -c archive_command='test ! -f /var/lib/postgresql/wal_archive/%f && cp %p /var/lib/postgresql/wal_archive/%f'
      -c max_wal_senders=3
      -c shared_buffers=384MB
      -c effective_cache_size=1152MB
      -c work_mem=4MB
      -c maintenance_work_mem=128MB
      -c max_connections=50
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zeus_user -d zeus_auto_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
    container_name: zeus_backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.25"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://zeus_user:${DB_PASSWORD}@db:5432/zeus_auto_db
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      REFRESH_SECRET: ${REFRESH_SECRET}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:3000/api/health > /dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: zeus_nginx
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    environment:
      - SERVER_NAME=${SERVER_NAME}
      - SSL_CERT_PATH=${SSL_CERT_PATH}
      - SSL_KEY_PATH=${SSL_KEY_PATH}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/entrypoint.sh:/entrypoint.sh:ro
      - ./nginx/nginx.conf.template:/etc/nginx/conf.d/default.conf.template:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./certbot/www:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./nginx/extra:/etc/nginx/conf.d/extra:ro
    command: /entrypoint.sh
    depends_on:
      backend:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  metabase:
    image: metabase/metabase:v0.53.2
    container_name: zeus_metabase
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "0.5"
    profiles: ["metabase"]
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase_db
      MB_DB_PORT: 5432
      MB_DB_USER: zeus_user
      MB_DB_PASS: ${DB_PASSWORD}
      MB_DB_HOST: db
      MB_ENCRYPTION_SECRET_KEY: ${METABASE_SECRET}
      JAVA_OPTS: "-Xmx768m -Xms384m"
    depends_on:
      - db
    volumes:
      - metabase_data:/metabase-data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  metabase_data:
