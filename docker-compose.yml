
services:
  db:
    image: postgres:15-alpine
    container_name: zeus_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: zeus_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: zeus_auto_db
    ports:
      - "5432:5432"


    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zeus_user -d zeus_auto_db"]
      interval: 5s
      timeout: 5s
      retries: 5


  backend:
    build:
      context: ./backend
    container_name: zeus_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://zeus_user:${DB_PASSWORD}@db:5432/zeus_auto_db
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      REFRESH_SECRET: ${REFRESH_SECRET}
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/ping > /dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    container_name: zeus_frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: /api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5173/ > /dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: zeus_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/ssl:ro
      - ./ssl-status:/ssl-status:ro
    extra_hosts:
      - "host.docker.internal:172.17.0.1"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
volumes:
  postgres_data:
