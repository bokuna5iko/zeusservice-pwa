services:
  db:
    image: postgres:15-alpine
    container_name: zeus_db
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: "1.0"
    environment:
      POSTGRES_USER: zeus_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: zeus_auto_db
    ports:
      - "${HOST_IP}:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - /opt/wal_archive:/var/lib/postgresql/wal_archive
    command: >
      postgres
      -c wal_level=replica
      -c archive_mode=off
      -c archive_command='test ! -f /var/lib/postgresql/wal_archive/%f && cp %p /var/lib/postgresql/wal_archive/%f'
      -c archive_timeout=3600
      -c max_wal_senders=3
      -c shared_buffers=384MB
      -c effective_cache_size=1152MB
      -c work_mem=4MB
      -c maintenance_work_mem=128MB
      -c max_connections=50
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zeus_user -d zeus_auto_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
    container_name: zeus_backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.25"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://zeus_user:${DB_PASSWORD}@db:5432/zeus_auto_db
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      REFRESH_SECRET: ${REFRESH_SECRET}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:3000/api/health > /dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    container_name: zeus_caddy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - SERVER_NAME=${SERVER_NAME}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frontend/dist:/usr/share/caddy:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
