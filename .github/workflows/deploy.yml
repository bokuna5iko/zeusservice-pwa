name: 🚀 Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, zeus-prod]
    
    steps:
      - name: 📥 Pull latest code
        working-directory: /opt/zeusservice-pwa
        run: |
          git status
          git pull origin main

      - name: 📦 Build frontend static files
        working-directory: /opt/zeusservice-pwa/frontend
        run: |
          echo "=== Installing dependencies ==="
          npm install
          
          echo "=== Building production bundle ==="
          npm run build
          
          echo "=== Build complete ==="
          ls -la /opt/zeusservice-pwa/frontend/dist/

      - name: 🐳 Build & Deploy Docker stack
        working-directory: /opt/zeusservice-pwa
        run: |
          echo "=== Building and starting services ==="
          docker compose up --build -d
          
          echo "=== Waiting for services (15s) ==="
          sleep 10
          
          echo "=== Service status ==="
          docker compose ps

          echo "=== Checking Nginx static files ==="
          ls -la /opt/zeusservice-pwa/frontend/dist/ | head -5

      - name: 🧹 Cleanup old Docker images
        run: |
          echo "=== Pruning unused images ==="
          docker system prune -f
